# Mini 2 tree overlay. Edges:
#   AB, BC, BD, BE, EF, ED, EG, AH, AG, AI
#
# Teams:
#   Blue   = {A, B, D, H}
#   Yellow = {C, E, F, G, I}
#
# NOTE: There's a cycle A-G-E-... A-G and A-H-? plus E-G — so "tree" here is
# really the edge set given in the spec (it is not acyclic, matching the
# prompt exactly).  We treat it as an undirected overlay graph.

# Host mapping — edit per deployment. For localhost dev, everything is 127.0.0.1.
# Ports are unique per node so 9 processes can coexist on one box.
nodes:
  A: { host: 192.168.50.2, port: 50051, team: blue,   role: gateway, impl: cpp    }
  B: { host: 192.168.50.2, port: 50052, team: blue,   role: peer,    impl: cpp    }
  C: { host: 192.168.50.2, port: 50053, team: yellow, role: peer,    impl: cpp    }
  D: { host: 192.168.50.2, port: 50054, team: blue,   role: peer,    impl: python }
  E: { host: 192.168.50.2, port: 50055, team: yellow, role: peer,    impl: cpp    }
  F: { host: 192.168.50.1, port: 50056, team: yellow, role: peer,    impl: python }
  G: { host: 192.168.50.1, port: 50057, team: yellow, role: peer,    impl: cpp    }
  H: { host: 192.168.50.1, port: 50058, team: blue,   role: peer,    impl: python }
  I: { host: 192.168.50.1, port: 50059, team: yellow, role: peer,    impl: cpp    }

# Undirected edges — used to seed neighbor tables.
edges:
  - [A, B]
  - [B, C]
  - [B, D]
  - [B, E]
  - [E, F]
  - [E, D]
  - [E, G]
  - [A, H]
  - [A, G]
  - [A, I]

# Next-hop routing from every node toward every other node (precomputed BFS).
# Only the gateway (A) needs full routing; leaves only need a path toward A.
# This is kept here so every process reads the same config.
routing:
  A:
    A: A
    B: B
    C: B
    D: B
    E: B
    F: B
    G: G
    H: H
    I: I
  B:
    A: A
    B: B
    C: C
    D: D
    E: E
    F: E
    G: E
    H: A
    I: A
  C: { A: B, B: B, C: C, D: B, E: B, F: B, G: B, H: B, I: B }
  D: { A: B, B: B, C: B, D: D, E: E, F: E, G: E, H: B, I: B }
  E:
    A: B
    B: B
    C: B
    D: D
    E: E
    F: F
    G: G
    H: B
    I: B
  F: { A: E, B: E, C: E, D: E, E: E, F: F, G: E, H: E, I: E }
  G:
    A: A
    B: E
    C: E
    D: E
    E: E
    F: E
    G: G
    H: A
    I: A
  H: { A: A, B: A, C: A, D: A, E: A, F: A, G: A, H: H, I: A }
  I: { A: A, B: A, C: A, D: A, E: A, F: A, G: A, H: A, I: I }

# Every node owns a partition (9-owner upgrade). Gateway A also produces from
# its own shard and drains it locally before falling back to peers; intermediate
# nodes B and E do double duty as router + data producer. The previous 6-owner
# layout (A,B,E without data) is preserved in older partition_<scheme>/ dirs
# for reference only.
data_owners: [A, B, C, D, E, F, G, H, I]

# Chunking defaults — can be overridden via CLI.
chunking:
  initial_rows: 64       # first chunk is small so first-byte is fast
  max_rows:     4096
  min_rows:     16
  target_chunk_ms: 25    # grow/shrink chunk size to hit this latency

# Fair scheduling
scheduler:
  mode: weighted_round_robin   # {fifo, round_robin, weighted_round_robin}
  max_concurrent_requests: 32
